<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Nilai</title>
</head>
<body>
    <table border="1">
        <tr>
            <td>Rentang Nilai</td>
            <td>Huruf Mutu</td>
        </tr>
        <tr>
            <td>80 - 100</td>
            <td>A</td>
        </tr>
        <tr>
            <td>70 - 79</td>
            <td>B</td>
        </tr>
        <tr>
            <td>60 - 69</td>
            <td>C</td>
        </tr>
        <tr>
            <td>50 - 59</td>
            <td>D</td>
        </tr>
        <tr>
            <td>0 - 49</td>
            <td>E</td>
        </tr>
    </table>

    <form action="" method="">
        <table>
            <tr>
                <td>NIM : </td>
                <td><input type="text" name="NIM" placeholder="Masukkan NIM"></td>
            </tr>
            <tr>
                <td>Nilai : </td>
                <td><input type="number" name="nilai" id="nilai" placeholder="Masukkan Nilai"></td>
            </tr>
            <tr><td><button type="button" onclick="hitung()">Hitung</button></td></tr>
        </table>
        <b><p id="hasil"></p></b>
    </form>
    <script>
        function hitung(){
            let nilai = document.getElementById("nilai").value;
            let grade = "";
            if(nilai < 49){
                grade = "E";
                document.getElementById("hasil").innerHTML = "Grade: " + grade;
            }else if(nilai < 59){
                grade = "D";
            }else if(nilai < 69){
                grade = "C";
            }else if(nilai < 79){
                grade = "B";
            }else if(nilai <= 100){
                grade = "A";
            }else{
                 document.getElementById("hasil").innerHTML = "Input tidak valid";
                return;
            }
            document.getElementById("hasil").innerHTML = "Grade: " + grade;
        }
    </script>
</body>
</html>
